# Introduction to Gemini Enterprise & NotebookLM

> **For participants:** In this workshop you'll build your **own** Gemini Enterprise app inside a temporary Google Cloud lab project — nothing touches your own Google account, and there's nothing to pay. The heavy lifting is automated by a one-line script; you only do a few clicks. Just follow each step exactly; no technical knowledge needed.

![Google Cloud Self-Paced Labs](https://cdn.qwiklabs.com/dW94pPHsWo4RxbyHDUVE7oyXDZS3QNm40RnYsQ9Mf2o%3D)

## Overview

**Gemini Enterprise** brings together Gemini's advanced reasoning, Google-quality search, and your enterprise data to help employees find the right information at the right time. Its AI agents can plan, reason, and execute tasks — assisting with information retrieval, summarization, task automation, data analysis, and reporting.

In this workshop, you'll set up and explore your own Gemini Enterprise app loaded with data for **Cymbal Foods**, a fictional food company. You'll use the general AI assistant to search and summarize, run a multi-agent brainstorm, build a custom agent with Agent Designer, generate a deep-research report, and finally use **NotebookLM** for focused, document-grounded analysis with an audio overview.

## What you will do

- **Set up your own Gemini Enterprise app** — a few clicks plus one automated command.
- **Play with Gemini Enterprise agents** — search, summarize, and brainstorm.
- **Build a custom Sales Assistant agent** with the visual Agent Designer.
- **Use the Deep Research agent** to generate a multi-page report.
- **Use NotebookLM** to analyze documents and generate an audio overview.

---

## Step 0. Start your lab

You'll work inside a temporary Google Cloud lab environment with its own **student account** and project.

1. Open the classroom page: 🔗 [Introduction to Gemini Enterprise](https://hkmci.qwiklabs.com/classrooms/108) (sign in if prompted).

2. On the **Labs** tab, click **Introduction to Gemini Enterprise**, then click **Start Lab**.

3. The **Lab setup and access** panel (left side) shows your temporary credentials — a **Username** ending in `@qwiklabs.net` and a **Password**.

4. Open an **Incognito / private browser window**, click **Open Google Cloud console**, and sign in with the lab **Username** and **Password**. (If you see "Choose an account", click **Use Another Account**.)

5. Accept the terms. **Don't** add recovery options or two-factor authentication (it's a temporary account).

> ⚠️ **Important:** use **only the lab student account** for everything in this workshop — Console, Google Drive, Calendar, and the Gemini Enterprise app. Your personal account will **not** see the app you build.
>
> ⏱️ The lab has a **90-minute timer** and cannot be paused, so keep moving through the steps.

---

## Step 1. Prepare your data (Google Drive & Calendar)

Gemini Enterprise searches **your own** Google Drive and Calendar — meaning the **lab account's** Drive and Calendar. So first you'll copy some sample Cymbal Foods files there and add one calendar event. This takes about 5 minutes.

### A. Add the Cymbal Foods files to the lab account's Google Drive

1. Open this shared folder: 📁 **Gemini Enterprise Drive Assets** → [open folder](https://drive.google.com/drive/folders/1yupuyQCTE1bQamCXgjXjemUTJCLr3s_z?usp=sharing)

2. Press **Ctrl+A** (Windows) / **Cmd+A** (Mac) to select all files, then right-click → **Download**. (Google Drive packs them into a `.zip`.)

3. **Unzip** the download (Windows: right-click → **Extract All**; Mac: double-click). You should have these 4 files:

   - `MARKETING_data.csv`
   - `SALES_data.csv`
   - `customer_feedback.csv`
   - `pie_chart_customer_sentiment-png.png`

4. In your **Incognito window** (signed in as the lab account), open [drive.google.com](https://drive.google.com/drive/home). Confirm the account icon (top right) shows your `student-...@qwiklabs.net` account.

5. Create a folder named **`Gemini Enterprise Drive Assets`**, open it, then **drag in** the 4 files (or use **+ New → File upload**).

6. Confirm your folder contains the four files:

   ![Gemini Enterprise Drive Assets in Drive](https://cdn.qwiklabs.com/D9o8GIz51ibDWWElbl8KUnD2YC5X7WDxu9spBSNoltA%3D)

### B. Add a Google Calendar event

1. In the same Incognito window, open [calendar.google.com](https://calendar.google.com/calendar/u/0/r) (signed in as the **lab account**). Dismiss any pop-ups.

2. Click **+ Create** → **Event**.

3. Fill in:

   - **Title:** `Cymbal Foods - Marketing Strategy Meeting`
   - **Start time:** at least **1 hour from now**

4. Click **Save**.

---

## Step 2. Set up your own Gemini Enterprise app

Now build the app itself. Part A is a few clicks in the Console; Part B is one command that automates all the data-store plumbing for you.

### A. Create the app (Console, ~2 minutes)

1. In the Google Cloud Console (Incognito window), search for **Gemini Enterprise** at the top and open it.

2. On the Gemini Enterprise card, click **Start 30 Day Free Trial**. If prompted to enable the Gemini Code Assist API, click **Continue** and **Activate the API**.

3. On the **Create** page, set:

   - **App name:** `Cymbal Foods - Gemini Enterprise`
   - **Location:** `global`

   Then click **Create**.

4. Click **Set up identity** → select **Use Google Identity** → click **Confirm Workforce Identity**.

### B. Connect the data stores (Cloud Shell, one command)

1. Click the **Activate Cloud Shell** icon (`>_`) at the top right of the Console. Click **Continue** / **Authorize** if prompted.

2. Paste this into the terminal and press Enter:

   ```
   git clone https://github.com/laucw1213/intro-to-GE.git && cd intro-to-GE && ./setup.sh
   ```

3. Wait for **`Apply complete!`** (about 2–3 minutes). The script automatically:

   - installs Terraform,
   - connects **Google Drive**, **Google Calendar**, and **Cloud Storage** data stores to your app,
   - loads the Cymbal Foods sample documents from Cloud Storage,
   - and enables all app features (Agent Designer, Canvas, NotebookLM, …).

### C. Open your app

1. Back in the Console, go to **Gemini Enterprise** → the **Overview** tab.

2. Click the URL under **"Your Gemini Enterprise webapp is ready"** to open your app. Sign in with the **lab account** if prompted.

3. You should land on the Gemini Enterprise home page, which looks similar to this:

   ![Gemini Enterprise UI](https://cdn.qwiklabs.com/SAS693SVYzGMQAxBBCBvjaYzeCDkWugUihKZ%2FDoFpG0%3D)

   On the home page you'll see a few sections:

   - **Agents:** Google-provided agents (or your own) for tasks like research and idea generation.
   - **Idea Generation:** Create a multi-agent ideation session with a team of agents.
   - **NotebookLM:** an AI-powered research and writing assistant that works best with sources you upload.
   - **Deep Research:** an agentic feature that can browse hundreds of websites and create multi-page reports in minutes.

> ⏳ **Heads up:** Gemini Enterprise may take **5–10 minutes** to finish indexing the data. If a search returns nothing at first, wait a few minutes and try again.
>
> 🏅 **Bonus:** this runs inside the official Google lab — on the lab page you can click **Check my progress** for the first three checkpoints to collect points as you go.

You're ready to go. 🎉

---

## Step 3. Interact with your Gemini Enterprise agents

In this step, you'll interact directly with agents — searching across the documents, extracting specific information, summarizing content, and running a multi-agent ideation session.

1. In the search bar, enter the following prompt:

   ```
   Give me an update on our latest marketing data.
   ```

2. Your answer should resemble the following:

![Search Result 1](https://cdn.qwiklabs.com/0UITQ3tNCbtc9pOWWTNzbtC%2B9GKUlWHPlZtYXTxnS4k%3D)

> **Note:** If no response is received, please refresh and submit the query again.

3. As a follow-up, ask:

   ```
   What products were in the March newsletter?
   ```

You can use the Gemini Enterprise AI assistant to handle multimodal prompts as well.

4. Click the **New chat** button on the top left corner to start a new chat.

5. In the search bar, click the **Tools** button, and select **Search Company data**.

6. Enter the following prompt:

   ```
   Summarize the customer sentiment pie chart.
   ```

The response should resemble the following:

![pie chart summarized by AI assistant](https://cdn.qwiklabs.com/R9ZMCIFSupkulJpdl6EUBNeKAyPvLLQCbxOG%2B4BooZk%3D)

> **Note:** you may need to run the query again if it doesn't find the pie chart image.

7. Click the **New chat** button on the top left corner to start a new chat.

8. Enter the following prompt:

   ```
   What meetings are on my agenda today? What do I need to have prepped for them?
   ```

Observe the response. Because Gemini Enterprise is connected to Google Calendar, it knows what events are coming up and can help you prepare for them!

### Multi-agent ideation

In this section, you'll use the Idea Generation agent to create a multi-agent ideation session for a sales presentation.

1. Click the **Google Gemini Enterprise** logo to return to the homepage.

2. Click **Idea Generation**.

3. In the Idea Generation prompt, enter:

   ```
   Help me brainstorm a new marketing campaign for Gen-Z customers based on our latest products.
   ```

You should see a high level presentation proposal generated for you:

![presentation flow for gen-z marketing campaign](https://cdn.qwiklabs.com/gIEtTfIvoGBYEaw2bApDnHM6YRRbDn5%2BjKuSszV0q8g%3D)

4. Review the proposal, scroll down, and click **Start session** to start generating ideas.

Your session has started and your team of AI agents is hard at work cranking out ideas! It might take a few minutes for the first ideas to be ready to view.

![photo of agent ideation session](https://cdn.qwiklabs.com/EcEjP411zjDBI%2FXl8w1rYglM1%2BDq1g4X7YeBDPJHa%2FI%3D)

While you wait for the ideation session to finish in the background, you can carry on with the next steps and come back to the results later.

## Step 5. Focused analysis with NotebookLM

Now you'll use **NotebookLM**, a tool designed for focused research and deep analysis on a specific set of documents. NotebookLM acts as your personal research assistant: you upload sources, then ask detailed questions, generate summaries, and synthesize information — with all answers grounded directly in the materials you provide.

### A. Download your source files

1. Open this shared folder: 📁 **NotebookLM Assets** → [open folder](https://drive.google.com/drive/folders/1GsXxHLq3LKyYm_r1Y67vAtAVp85HL6c5?usp=sharing)

2. Select all (**Ctrl+A** / **Cmd+A**) → right-click → **Download**, then **unzip**. You should have these 3 files on your computer (e.g. on your Desktop):

   - `SALES_data.txt`
   - `customer_feedback.txt`
   - `MARKETING_data.txt`

### B. Create a Cymbal Foods analysis notebook and upload sources

1. On the Gemini Enterprise home page, click **NotebookLM** on the left-hand navigation pane.

2. On the NotebookLM home page, in the Link section, click **Open**, and then click **Create New Notebook**.

3. The **Add sources** dialog appears:

   ![NotebookLM Add Sources Dialog](https://cdn.qwiklabs.com/6bB1f23%2FJ9yq4R6GjEuXkrBLSYNh35SOqRjfxGU7Oj4%3D)

4. **Add the text files as sources.** Click **Choose file** and select the three `.txt` files you just unzipped:

   - `SALES_data.txt`
   - `customer_feedback.txt`
   - `MARKETING_data.txt`

   Then wait for NotebookLM to process the sources. You should see them listed within your notebook once they're ready.

![notebooklm-text-files-uploaded.png](https://cdn.qwiklabs.com/WUSdSYOrFFuTA7h7NN3HDf5qyJiEautPhvnlZ88gXog%3D)

### Interacting with Your Sources in NotebookLM

With your Cymbal Foods data loaded into the notebook, you can now ask targeted questions and explore the content.

1. Take a moment to observe the NotebookLM interface. You'll typically see your added sources listed (often on the left side of the screen), a central area for the chat section, and a Studio section for your notes and the Audio Overview.

2. **Ask Grounded Questions to NotebookLM:** In the chat input bar, type your questions. NotebookLM will generate answers based *only* on the content of the documents you've uploaded into this specific notebook. Try the following prompts:

   - **Query 1:**
     ```
     What audience did the Spring Cookie Promotion target?
     ```

   - **Query 2:**
     ```
     Summarize the key themes from the customer_feedback.txt regarding products that had sales figures reported in Q1 2026 in the SALES_data.txt.
     ```

   - **Query 3:**
     ```
     Are there any marketing campaigns in MARKETING_data.txt that correspond to products with significant customer feedback or notable sales trends from the other documents?
     ```

   - **Query 4 (General inquiry about a single document):**
     ```
     What are the top 3 most frequently mentioned positive aspects in the customer_feedback.txt?
     ```

Notice how NotebookLM formulates its answers. The information is drawn directly from your uploaded text files. NotebookLM will often provide **citations** or highlight the source text used to generate an answer — look for these, as they help you verify the information and refer back to the original context. NotebookLM is designed for iterative exploration, so you can ask follow-up questions to dive deeper.

A key feature of NotebookLM is the ability to save AI responses, key passages, or your own thoughts as "notes" within the notebook. (Look for options like "Add to notes" or a dedicated notes panel.)

Beyond textual summaries and Q&A, NotebookLM offers an 'Audio Overview' feature — a spoken, podcast-like summary of the key insights from your sources.

3. In the **Studio** section, click **Audio Overview**.

![generate audio overview in notebooklm](https://cdn.qwiklabs.com/16r%2FFTh2c2ZRrOmNs6YPcqlAg8hAfCFRhKBW4K37ck4%3D)

4. **Listen and Reflect:** Take a listen to the Audio Overview once it's generated. Consider how accurately it captured the main themes. Think about how this audio format could help you quickly grasp key points or review material when reading isn't convenient.

### Continue Exploration (Optional)

  <script>
    // ===== Theme =====
    function setTheme(theme) {
      const dark = theme === 'dark';
      document.documentElement.classList.toggle('dark', dark);
      document.getElementById('md-light-css').disabled = dark;
      document.getElementById('md-dark-css').disabled = !dark;
      document.getElementById('hl-light-css').disabled = dark;
      document.getElementById('hl-dark-css').disabled = !dark;
      try { localStorage.setItem('mcl-theme', theme); } catch (e) {}
    }
    setTheme(document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    document.getElementById('theme-btn').addEventListener('click', () => {
      setTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark');
    });

    // ===== Render markdown =====
    // Open all links in a new tab so iframe navigation is never hijacked
    const renderer = new marked.Renderer();
    renderer.link = function(href, title, text) {
      // marked v5+ passes a single token object instead of (href, title, text)
      if (href && typeof href === 'object') {
        text  = href.text;
        title = href.title;
        href  = href.href;
      }
      const t = title ? ` title="${title}"` : '';
      return `<a href="${href}"${t} target="_blank" rel="noopener noreferrer">${text}</a>`;
    };
    marked.setOptions({
      gfm: true, breaks: false,
      renderer: renderer,
      highlight: function (code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
        }
        return hljs.highlightAuto(code).value;
      }
    });

    const source = document.getElementById('lab-content').textContent;
    const content = document.getElementById('content');
    content.innerHTML = marked.parse(source);

    // Highlight remaining code blocks
    content.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));

    // Copy buttons on pre blocks
    content.querySelectorAll('pre').forEach(pre => {
      const btn = document.createElement('button');
      btn.className = 'pre-copy-btn';
      btn.textContent = 'Copy';
      btn.addEventListener('click', () => {
        const text = pre.querySelector('code') ? pre.querySelector('code').textContent : pre.textContent;
        const done = () => {
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1400);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done).catch(done);
        } else { done(); }
      });
      pre.appendChild(btn);
    });

    // ===== Mobile TOC drawer =====
    const overlay    = document.getElementById('toc-overlay');
    const drawer     = document.getElementById('toc-drawer');
    const drawerClose = document.getElementById('drawer-close');
    const tocFab     = document.getElementById('toc-fab');
    const mobileList = document.getElementById('toc-mobile-list');
    function openDrawer()  { drawer.classList.add('open'); overlay.classList.add('open'); document.body.style.overflow = 'hidden'; }
    function closeDrawer() { drawer.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = ''; }
    tocFab.addEventListener('click', openDrawer);
    overlay.addEventListener('click', closeDrawer);
    drawerClose.addEventListener('click', closeDrawer);

    // ===== Back to top =====
    const backBtn = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => {
      backBtn.classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });
    backBtn.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });

    // ===== TOC =====
    const tocEl   = document.getElementById('toc-list');
    const headings = content.querySelectorAll('h2');
    const tocItems = [];
    let isProgrammaticScroll = false;
    let scrollTimer = null;
    let activeID = null;
    const linkByID = {};
    const mobileLinkByID = {};

    function setActive(id) {
      if (id === activeID) return;
      linkByID[activeID]?.classList.remove('active');
      mobileLinkByID[activeID]?.classList.remove('active');
      linkByID[id]?.classList.add('active');
      mobileLinkByID[id]?.classList.add('active');
      activeID = id;
    }

    function scrollToHeading(id) {
      const target = document.getElementById(id);
      if (!target) return;
      setActive(id);
      isProgrammaticScroll = true;
      clearTimeout(scrollTimer);
      const y = target.getBoundingClientRect().top + window.scrollY - 76;
      window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });
      scrollTimer = setTimeout(() => { isProgrammaticScroll = false; }, 800);
    }

    headings.forEach((h, i) => {
      if (!h.id) h.id = 'sec-' + i;

      // Desktop TOC link
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#' + h.id; a.textContent = h.textContent;
      a.dataset.target = h.id; a.className = 'toc-link';
      a.addEventListener('click', e => { e.preventDefault(); scrollToHeading(h.id); });
      li.appendChild(a); tocEl.appendChild(li);
      linkByID[h.id] = a;

      // Mobile TOC link
      const mli = document.createElement('li');
      const ma = document.createElement('a');
      ma.href = '#' + h.id; ma.textContent = h.textContent;
      ma.dataset.target = h.id; ma.className = 'toc-mobile-link';
      ma.addEventListener('click', e => { e.preventDefault(); closeDrawer(); scrollToHeading(h.id); });
      mli.appendChild(ma); mobileList.appendChild(mli);
      mobileLinkByID[h.id] = ma;

      tocItems.push({ link: a, heading: h });
    });

    if (tocItems.length) setActive(tocItems[0].heading.id);

    if ('IntersectionObserver' in window && tocItems.length) {
      const observer = new IntersectionObserver(entries => {
        if (isProgrammaticScroll) return;
        const visible = entries.filter(e => e.isIntersecting).sort((a, b) => a.target.offsetTop - b.target.offsetTop);
        if (visible.length) setActive(visible[0].target.id);
      }, { rootMargin: '-15% 0px -70% 0px', threshold: 0 });
      tocItems.forEach(it => observer.observe(it.heading));
    }
  </script>
